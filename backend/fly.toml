# fly.toml — Fly.io app config for the FastAPI backend (AMB-deploy).
#
# Deploy from `backend/`:
#   cd backend
#   fly launch --no-deploy --copy-config --name airflow-meetup-bingo-be
#   fly secrets set DB_URL=... ENV=production EVENT_SLUG_SALT=... \
#                   SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=...
#   fly deploy
#
# Region pinned to sin (Singapore) so latency to the Supabase
# Supavisor pooler in ap-southeast-1 is single-digit ms.

app = "airflow-meetup-bingo-be"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  # Run alembic head before booting in case a new migration was
  # bundled in this release. Idempotent — no-op when already
  # applied.
  release_command = "alembic upgrade head"
